<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Feedback | Parking System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --classic-gold: #c5a059; --dark-bg: #0a0a0a; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Times New Roman', serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .feedback-card { border: 2px solid var(--classic-gold); background: #111; padding: 40px; border-radius: 15px; width: 500px; box-shadow: 0 0 40px rgba(0,0,0,1); }
        h2 { color: var(--classic-gold); text-transform: uppercase; text-align: center; margin-bottom: 20px; }
        .form-control { background: #222; border: 1px solid var(--classic-gold); color: white; margin-bottom: 15px; }
        .form-control:focus { background: #222; color: white; border-color: white; box-shadow: none; }
        .btn-submit { border: 1px solid var(--classic-gold); color: var(--classic-gold); background: transparent; width: 100%; padding: 10px; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .btn-submit:hover { background: var(--classic-gold); color: black; }
    </style>
</head>
<body>
<div class="feedback-card">
    <h2>Driver Feedback</h2>
    <p class="text-center">How was your parking experience?</p>
    <form action="/parking/submit-feedback" method="post">
        <input type="text" name="name" class="form-control" placeholder="Your Name" required>
        <textarea name="comment" class="form-control" rows="4" placeholder="Your Comments..." required></textarea>
        <button type="submit" class="btn btn-submit">Submit Feedback</button>
    </form>
</div>
</body>
</html>

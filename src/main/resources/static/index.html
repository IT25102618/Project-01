<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Parking System Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --classic-gold: #c5a059; }
        body, html { height: 100%; margin: 0; font-family: 'Times New Roman', serif; overflow: hidden; }

        /* Blurred Parking Background */
        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                        url('https://images.unsplash.com/photo-1506521781263-d8422e82f27a?auto=format&fit=crop&q=80&w=1920');
            background-size: cover; filter: blur(10px); transform: scale(1.1); z-index: -1;
        }

        .layout-wrapper { display: flex; flex-direction: column; height: 100vh; position: relative; z-index: 1; }
        .main-content { flex: 1; display: flex; justify-content: center; align-items: center; }

        .dashboard-card {
            background: rgba(20, 20, 20, 0.9); padding: 50px; border-radius: 15px;
            width: 450px; text-align: center; border: 2px solid var(--classic-gold);
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .btn-classic {
            background: #000; color: white; border: 1px solid var(--classic-gold);
            padding: 15px; width: 100%; margin: 10px 0; font-size: 1.2rem;
            text-transform: uppercase; font-weight: bold; transition: 0.4s;
            display: block; text-decoration: none;
        }
        .btn-classic:hover { background: #1a1a1a; color: var(--classic-gold); border-color: white; }

        /* Car Door Animation */
        .door-overlay {
            position: fixed; top: 0; left: -100%; width: 100%; height: 100%;
            background: #111; z-index: 9999; transition: 0.8s cubic-bezier(0.7, 0, 0.3, 1);
            display: flex; align-items: center; justify-content: center;
        }
        .door-overlay.active { left: 0; }

        footer { background: rgba(0, 0, 0, 0.95); border-top: 1px solid var(--classic-gold); padding: 20px 0; color: #ccc; }
        .footer-label { color: var(--classic-gold); font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }
    </style>
</head>
<body>
<div id="carDoor" class="door-overlay"><h1 style="color:var(--classic-gold)">ENTERING...</h1></div>
<div class="bg-container"></div>
<div class="layout-wrapper">
    <div class="main-content">
        <div class="dashboard-card">
            <h1 class="mb-5"><span style="background:#03d2ff; padding: 2px 8px; border-radius: 5px;">P</span> Parking Portal</h1>
            <a href="javascript:void(0)" onclick="animateDoor('/driver-registration.html')" class="btn-classic">Driver Registration</a>
            <a href="/admin-dashboard.html" class="btn-classic">Admin Control</a>
        </div>
    </div>
    <footer>
        <div class="container">
            <div class="row text-center">
                <div class="col"><div class="footer-label">About Us</div><small>Premium Parking</small></div>
                <div class="col"><div class="footer-label">Careers</div><small>Join Us</small></div>
                <div class="col"><div class="footer-label">Email</div><small>contact@parkingsys.com</small></div>
                <div class="col"><div class="footer-label">Phone</div><small>+1-555-PARK</small></div>
                <div class="col"><div class="footer-label">Location</div><small>123 Skyview Ave</small></div>
            </div>
        </div>
    </footer>
</div>
<script>
    function animateDoor(url) {
        document.getElementById('carDoor').classList.add('active');
        setTimeout(() => { window.location.href = url; }, 800);
    }
</script>
</body>
</html>

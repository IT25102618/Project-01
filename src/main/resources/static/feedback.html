<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('/images/parking-bg.jpg'); background-size: cover; height: 100vh; display: flex; align-items: center; justify-content: center; color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); padding: 30px; border-radius: 15px; width: 450px; border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body>
<div class="glass-card">
    <h2 class="text-center">⭐ Rate Our Service</h2>
    <form action="/feedback/submit" method="get">
        <div class="mb-3"><label>Your Name:</label><input type="text" name="name" class="form-control" required></div>
        <div class="mb-3"><label>Rating (1-5):</label><input type="number" name="rating" min="1" max="5" class="form-control" required></div>
        <div class="mb-3"><label>Comments:</label><textarea name="msg" class="form-control" rows="3"></textarea></div>
        <button type="submit" class="btn btn-warning w-100">Submit Review</button>
    </form>
</div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 2 rows of 3 slots = 6 slots */
            gap: 20px;
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 20px;
        }
        .slot-box {
            width: 120px; height: 150px;
            border-radius: 10px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
            border: 2px solid transparent;
        }
        .available { background: rgba(40, 167, 69, 0.2); border-color: #28a745; }
        .available:hover { background: rgba(40, 167, 69, 0.4); transform: scale(1.05); }
        .occupied { background: rgba(220, 53, 69, 0.2); border-color: #dc3545; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="grid-container" id="slotGrid">
</div>

<script>
    // 1. Fetch the real status from the backend when the page opens
    fetch('/slots/view')
        .then(response => response.json())
        .then(slots => {
            const grid = document.getElementById('slotGrid');
            grid.innerHTML = ''; // Clear the hardcoded boxes

            slots.forEach(slot => {
                const box = document.createElement('div');
                box.className = `slot-box ${slot.occupied ? 'occupied' : 'available'}`;

                // Set the text based on status
                const statusText = slot.occupied ? 'TAKEN' : 'FREE';
                box.innerHTML = `<h5>${slot.id}</h5><small>${statusText}</small>`;

                // Only allow clicking if it's FREE
                if (!slot.occupied) {
                    box.onclick = () => bookSlot(slot.id);
                }

                grid.appendChild(box);
            });
        });

    function bookSlot(id) {
        let plate = prompt("Enter Plate Number to confirm booking for " + id + ":");
        if (plate) {
            window.location.href = "/slots/confirm-booking?slotId=" + id + "&plate=" + plate;
        }
    }
</script>


</body>
</html>

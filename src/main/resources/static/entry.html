<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vehicle Entry Gate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            /* Background image setup */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
                        url('/images/parking-bg.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            color: white;
            width: 100%;
            max-width: 450px;
        }

        .btn-primary {
            background-color: #00d2ff;
            border: none;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background-color: #3a7bd5;
            transform: translateY(-2px);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="glass-card">
    <h2 class="text-center mb-4">🚗 Entry Gate</h2>
    <p class="text-center small">Please record vehicle details to open the barrier.</p>
    <hr>

    <form action="/parking/entry" method="get">
        <div class="mb-3">
            <label class="form-label">License Plate</label>
            <input type="text" name="plate" class="form-control" placeholder="e.g. WP-ABC-1234" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Create Security PIN</label>
            <input type="password" name="pin" class="form-control" placeholder="4-digit PIN" required>
        </div>

        <div class="d-grid gap-2 mt-4">
            <button type="submit" class="btn btn-primary btn-lg">Issue Entry Token</button>
        </div>
    </form>
</div>

</body>
</html>

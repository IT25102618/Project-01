<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Driver Registration | Premium Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-accent: #00d2ff;
            --primary-hover: #3a7bd5;
            --classic-gold: #c5a059;
            --dark-overlay: rgba(10, 10, 12, 0.85);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Outfit', sans-serif;
            color: #ffffff;
            overflow: hidden;
            background-color: #050505;
        }

        /* Animated Dynamic Background */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(var(--dark-overlay), var(--dark-overlay)),
                              url('https://images.unsplash.com/photo-1506521781263-d8422e82f27a?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
            filter: blur(8px);
            transform: scale(1.05);
            z-index: -1;
            animation: bg-pan 30s infinite alternate ease-in-out;
        }

        @keyframes bg-pan {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .layout-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
            z-index: 1;
        }

        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Glassmorphism Registration Card */
        .reg-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px 50px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            transform: translateY(0);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeUp 0.8s ease-out forwards;
        }

        .reg-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0,210,255,0.15), inset 0 0 0 1px rgba(255, 255, 255, 0.2);
            border-color: rgba(0, 210, 255, 0.3);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reg-header {
            text-align: center;
            margin-bottom: 35px;
            position: relative;
        }

        .logo-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-accent), var(--primary-hover));
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 15px;
            box-shadow: 0 8px 20px rgba(0, 210, 255, 0.4);
        }

        .reg-header h2 {
            margin: 0;
            letter-spacing: 0.5px;
            color: #ffffff;
            font-size: 1.8rem;
            font-weight: 600;
        }
        
        .reg-header p {
            color: #a0a0b0;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        /* Form Styling */
        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        label {
            color: #d0d0e0;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
            display: block;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
        }

        .form-control {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 10px;
            padding: 12px 15px;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-control:focus {
            background: rgba(0, 0, 0, 0.4);
            border-color: var(--primary-accent);
            color: white;
            box-shadow: 0 0 0 3px rgba(0, 210, 255, 0.2), inset 0 2px 4px rgba(0,0,0,0.2);
            outline: none;
        }

        .form-group:focus-within label {
            color: var(--primary-accent);
        }

        /* Elegant Gradient Button */
        .btn-register {
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            color: white;
            border: none;
            border-radius: 10px;
            width: 100%;
            padding: 14px;
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-register::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn-register:hover::before {
            left: 100%;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(0, 210, 255, 0.4);
        }

        .btn-register:active {
            transform: translateY(1px);
        }

        /* Select Styling tweaks for dark mode */
        select.form-control option {
            background-color: #1a1a24;
            color: white;
            padding: 10px;
        }

        /* Unified Modern Footer */
        footer {
            width: 100%;
            background: rgba(5, 5, 8, 0.85);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 25px 0;
            color: #888;
        }

        .footer-label {
            color: var(--classic-gold);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        .footer-item {
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0 15px;
        }

        .footer-item:last-child {
            border-right: none;
        }

        .footer-item small {
            font-size: 0.8rem;
            color: #a0a0b0;
        }
    </style>
</head>
<body>

<div class="bg-container"></div>

<div class="layout-wrapper">
    <div class="main-content">
        <div class="reg-card">
            <div class="reg-header">
                <div class="logo-mark">P</div>
                <h2>Driver Registration</h2>
                <p>Enter your details to generate your access token.</p>
            </div>

            <form action="/drivers/register" method="get" onsubmit="savePlateLocally()">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label>Contact Number</label>
                    <input type="text" name="contact" id="contact" class="form-control"
                           placeholder="10-digit mobile number"
                           pattern="\d{10}" title="Must be exactly 10 digits (e.g., 0771234567)" required>
                </div>

                <div class="form-group">
                    <label>License Plate</label>
                    <input type="text" name="plate" id="plate" class="form-control"
                           placeholder="e.g. AB1234"
                           pattern="[A-Za-z]{2}\d{4}" title="Must be 2 letters followed by 4 numbers (e.g., AB1234)" required>
                </div>

                <div class="form-group">
                    <label>Membership Type</label>
                    <select name="type" class="form-control">
                        <option value="Member">Member (Monthly)</option>
                        <option value="Guest">Guest (Hourly)</option>
                    </select>
                </div>

                <button type="submit" class="btn-register">Register Driver</button>
            </form>
        </div>
    </div>

    <footer>
        <div class="container">
            <div class="row text-center">
                <div class="col footer-item">
                    <div class="footer-label">About Us</div>
                    <small>Premium Parking</small>
                </div>
                <div class="col footer-item">
                    <div class="footer-label">Careers</div>
                    <small>Join our Team</small>
                </div>
                <div class="col footer-item">
                    <div class="footer-label">Email</div>
                    <small>hello@parkingsys.com</small>
                </div>
                <div class="col footer-item">
                    <div class="footer-label">Phone</div>
                    <small>+1-555-PARKING</small>
                </div>
                <div class="col footer-item d-none d-md-block">
                    <div class="footer-label">Location</div>
                    <small>Level 1 Concierge</small>
                </div>
            </div>
            <div class="text-center mt-4" style="font-size: 0.75rem; color: #555;">
                © 2026 Parking Solutions Ltd. All rights reserved. Designed for excellence.
            </div>
        </div>
    </footer>
</div>

<script>
    // Store details in localStorage so the user doesn't have to re-register next time
    function savePlateLocally() {
        const plateValue = document.getElementById('plate').value;
        localStorage.setItem('registeredPlate', plateValue);
    }
</script>
</body>
</html>
